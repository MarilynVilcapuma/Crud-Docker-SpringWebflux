# ─────────────────────────────────────────────────────────────
# SECRET: credenciales que la app lee como variables de entorno.
# Deben llamarse IGUAL que las variables del application.yaml:
#   username: ${SECRET_USERNAME:sa}        →  clave SECRET_USERNAME
#   password: ${SECRET_PASSWORD:password}  →  clave SECRET_PASSWORD
# El deployment las inyecta con envFrom → secretRef.
#
# Con "data:" los valores van codificados en BASE64 (no texto plano).
# Generar el base64 de un valor:
#   PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("sa"))
#   Linux/Git Bash: echo -n 'sa' | base64      (¡usar -n, sin salto de línea!)
# Decodificar para verificar:
#   Linux/Git Bash: echo 'c2E=' | base64 -d
# OJO: base64 es codificación, NO cifrado — no subir secrets reales al repo.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: marilynvilcapuma-secret   # 🔧 ADAPTAR: tunombre-secret (debe coincidir con secretRef del deployment)
  namespace: marilynvilcapuma     # 🔧 ADAPTAR: mismo namespace del namespace.yml
type: Opaque
data:
  SECRET_USERNAME: c2E=           # 🔧 ADAPTAR: base64 de "sa" (usuario de la BD del proyecto)
  SECRET_PASSWORD: cGFzc3dvcmQ=   # 🔧 ADAPTAR: base64 de "password" (contraseña de la BD del proyecto)
